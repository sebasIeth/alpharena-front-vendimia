services:
  alpharena-front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_MARRAKECH_VIEWER_URL: ${NEXT_PUBLIC_MARRAKECH_VIEWER_URL}
        NEXT_PUBLIC_CHAIN_ENV: ${NEXT_PUBLIC_CHAIN_ENV}
        SOLANA_RPC_INTERNAL: ${SOLANA_RPC_INTERNAL}
    container_name: alpharena-front-vendimia
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - HOSTNAME=0.0.0.0
      - SOLANA_RPC_INTERNAL=${SOLANA_RPC_INTERNAL}
    restart: unless-stopped
